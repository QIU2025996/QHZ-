name: AI Collaborative Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          BASE="origin/${{ github.base_ref }}"
          git diff $BASE...HEAD > /tmp/pr.diff 2>/dev/null || git diff origin/main...HEAD > /tmp/pr.diff
          echo "diff_size=$(wc -c < /tmp/pr.diff)" >> $GITHUB_OUTPUT

      - name: Skip if empty
        if: steps.diff.outputs.diff_size == '0'
        run: echo "empty" && exit 0

      - name: Gemini Review
        id: gemini
        continue-on-error: true
        env:
          KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=$KEY" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"Review this PR diff briefly. Format: SUMMARY / ISSUES / VERDICT. Diff: \"}]}]}" \
            > /tmp/g.json 2>&1 || echo '{"error":"gemini_failed"}' > /tmp/g.json

      - name: Post Gemini
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let r = fs.readFileSync('/tmp/g.json', 'utf8');
            try { const d = JSON.parse(r); r = d.candidates?.[0]?.content?.parts?.[0]?.text || r; } catch(e){}
            github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## Gemini Code Review\n\n```\n' + r + '\n```\n\n*Generated by Gemini AI*'
            });

      - name: StepFun Review
        id: stepfun
        continue-on-error: true
        env:
          KEY: ${{ secrets.STEPFUN_API_KEY }}
        run: |
          python3 -c "
import json, urllib.request, os
diff = open('/tmp/pr.diff').read()
data = json.dumps({'model':'step-3.7-flash','messages':[{'role':'user','content':'Review this PR diff. Format: SUMMARY / ISSUES / VERDICT.\n\nDiff:\n'+diff}]}).encode()
req = urllib.request.Request('https://api.stepfun.com/step_plan/v1/chat/completions', data=data, headers={'Content-Type':'application/json','Authorization':'Bearer '+os.environ['KEY']})
with urllib.request.urlopen(req) as resp:
    r = json.loads(resp.read())
    open('/tmp/s.md','w').write(r['choices'][0]['message']['content'])
" 2>&1 || echo "StepFun failed" > /tmp/s.md

      - name: Post StepFun
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const r = fs.readFileSync('/tmp/s.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## Claude Review (StepFun)\n\n```\n' + r + '\n```\n\n*Generated by Claude via StepFun*'
            });
