name: AI Collaborative Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          STEPFUN_API_KEY: ${{ secrets.STEPFUN_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff 2>/dev/null || git diff origin/main...HEAD > /tmp/pr.diff
          cp .github/scripts/collaborative_review.py /tmp/review.py
          python3 /tmp/review.py
