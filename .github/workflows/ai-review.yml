name: AI Collaborative Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="origin/main"
          fi
          git diff $BASE...HEAD -- . ':(exclude)package-lock.json' ':(exclude)pnpm-lock.yaml' ':(exclude)yarn.lock' > /tmp/pr.diff
          echo "diff_size=$(wc -c < /tmp/pr.diff)" >> $GITHUB_OUTPUT

      - name: Skip if no code changes
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No code changes to review" && exit 0

      - name: Fetch existing PR comments
        id: comments
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 << 'PYEOF'
import json, urllib.request, os

url = f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/{os.environ['PR_NUMBER']}/comments?per_page=100"
req = urllib.request.Request(url, headers={
    'Authorization': f"token {os.environ['GH_TOKEN']}",
    'Accept': 'application/vnd.github.v3+json'
})
with urllib.request.urlopen(req) as resp:
    comments = json.loads(resp.read())

ai_comments = []
for c in comments:
    if c['user']['type'] == 'Bot':
        ai_comments.append(c['body'])

with open('/tmp/previous_reviews.md', 'w') as f:
    if ai_comments:
        f.write('\n\n---\n\n'.join(ai_comments))
    else:
        f.write('')
print(f'Found {len(ai_comments)} previous AI review comments')
PYEOF

      - name: Gemini Review (Round 1)
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr.diff)
          PREVIOUS=$(cat /tmp/previous_reviews.md 2>/dev/null)

          PROMPT="You are an expert code reviewer.

Review the following pull request diff.

Requirements:
1. SUMMARY: 1-2 sentences
2. ISSUES: List with severity (CRITICAL/HIGH/MEDIUM/LOW)
3. SUGGESTIONS: Optional improvements
4. VERDICT: APPROVE or REQUEST_CHANGES

Diff:
---DIFF---
${DIFF_CONTENT}
---END DIFF---"

          ESCAPED_PROMPT=$(echo "$PROMPT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=AIzaSyCHbxYXLJeR4GvXxresXnfCZhEQ60oSFPs" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":${ESCAPED_PROMPT}}]}]}")

          echo "$RESPONSE" > /tmp/gemini-result.json

      - name: Format Gemini result
        run: |
          python3 << 'PYEOF'
import json
try:
    with open('/tmp/gemini-result.json') as f:
        data = json.load(f)
    text = ''
    if 'candidates' in data and data['candidates']:
        for p in data['candidates'][0].get('content',{}).get('parts',[]):
            text += p.get('text','')
    with open('/tmp/gemini-review.md', 'w') as f:
        f.write(text or 'Error: No response from Gemini')
except Exception as e:
    with open('/tmp/gemini-review.md', 'w') as f:
        f.write(f'Error: {e}')
PYEOF

      - name: Post Gemini comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/gemini-review.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Gemini Code Review\n\n<details>\n<summary>Review Details</summary>\n\n\`\`\`\n${result}\n\`\`\`\n\n</details>\n\n*Generated by Gemini AI*`
            });

      - name: Agnes Review
        id: agnes
        continue-on-error: true
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr.diff)
          GEMINI_REVIEW=$(cat /tmp/gemini-review.md)

          PROMPT="You are an expert code reviewer.

Review the following pull request diff. Gemini has already reviewed it below.

Gemini's review:
---
${GEMINI_REVIEW}
---

Requirements:
1. SUMMARY: 1-2 sentences
2. ISSUES: List with severity (CRITICAL/HIGH/MEDIUM/LOW)
3. AGREEMENT/DISAGREEMENT: Your perspective vs Gemini's
4. VERDICT: APPROVE or REQUEST_CHANGES

Diff:
---DIFF---
${DIFF_CONTENT}
---END DIFF---"

          python3 -c "
import json, urllib.request, os

prompt = '''${PROMPT}'''

data = json.dumps({
    'model': 'agnes-2.0-flash',
    'messages': [{'role': 'user', 'content': prompt}]
}).encode()

req = urllib.request.Request(
    'https://apihub.agnes-ai.com/v1/chat/completions',
    data=data,
    headers={
        'Content-Type': 'application/json',
        'Authorization': os.environ['AGNES_API_KEY']
    }
)
with urllib.request.urlopen(req) as resp:
    result = json.loads(resp.read())
    text = result['choices'][0]['message']['content']
    with open('/tmp/agnes-review.md', 'w') as f:
        f.write(text)
" 2>&1 || echo "Error: Agnes API call failed" > /tmp/agnes-review.md

      - name: Post Agnes comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/agnes-review.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Agnes AI Review\n\n<details>\n<summary>Review Details</summary>\n\n\`\`\`\n${result}\n\`\`\`\n\n</details>\n\n*Generated by Agnes AI*`
            });

      - name: StepFun Review
        id: stepfun
        continue-on-error: true
        env:
          STEPFUN_API_KEY: ${{ secrets.STEPFUN_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr.diff)
          GEMINI_REVIEW=$(cat /tmp/gemini-review.md)
          AGNES_REVIEW=$(cat /tmp/agnes-review.md)

          PROMPT="You are an expert code reviewer.

This is the final review. Read both Gemini's and Agnes's reviews below, then provide your synthesis.

Gemini's review:
---
${GEMINI_REVIEW}
---

Agnes AI's review:
---
${AGNES_REVIEW}
---

Requirements:
1. SUMMARY: 1-2 sentences
2. ISSUES: List with severity (CRITICAL/HIGH/MEDIUM/LOW) — include any issues previous reviewers missed
3. CONSENSUS: Where do you agree/disagree with previous reviewers?
4. VERDICT: APPROVE or REQUEST_CHANGES (final verdict)

Diff:
---DIFF---
${DIFF_CONTENT}
---END DIFF---"

          python3 -c "
import json, urllib.request, os

prompt = '''${PROMPT}'''

data = json.dumps({
    'model': 'step-3.7-flash',
    'messages': [{'role': 'user', 'content': prompt}]
}).encode()

req = urllib.request.Request(
    'https://api.stepfun.com/step_plan/v1/chat/completions',
    data=data,
    headers={
        'Content-Type': 'application/json',
        'Authorization': f'Bearer {os.environ[\"STEPFUN_API_KEY\"]}'
    }
)
with urllib.request.urlopen(req) as resp:
    result = json.loads(resp.read())
    text = result['choices'][0]['message']['content']
    with open('/tmp/stepfun-review.md', 'w') as f:
        f.write(text)
" 2>&1 || echo "Error: StepFun API call failed" > /tmp/stepfun-review.md

      - name: Post StepFun comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/stepfun-review.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Claude Review (StepFun)\n\n<details>\n<summary>Review Details</summary>\n\n\`\`\`\n${result}\n\`\`\`\n\n</details>\n\n*Generated by Claude via StepFun API*`
            });
