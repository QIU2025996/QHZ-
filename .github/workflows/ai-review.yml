name: AI Collaborative Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="origin/main"
          fi
          git diff $BASE...HEAD -- . ':(exclude)package-lock.json' ':(exclude)pnpm-lock.yaml' ':(exclude)yarn.lock' > /tmp/pr.diff
          echo "diff_size=$(wc -c < /tmp/pr.diff)" >> $GITHUB_OUTPUT

      - name: Skip if no code changes
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No code changes to review" && exit 0

      - name: Fetch existing PR comments
        id: comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 -c "
          import json, urllib.request, os

          url = f'https://api.github.com/repos/{os.environ[\"GITHUB_REPOSITORY\"]}/issues/{os.environ[\"PR_NUMBER\"]}/comments?per_page=100'
          req = urllib.request.Request(url, headers={
              'Authorization': f'token {os.environ[\"GH_TOKEN\"]}',
              'Accept': 'application/vnd.github.v3+json'
          })
          with urllib.request.urlopen(req) as resp:
              comments = json.loads(resp.read())

          # Extract AI review comments
          ai_comments = []
          for c in comments:
              if c['user']['type'] == 'Bot':
                  ai_comments.append(c['body'])

          with open('/tmp/previous_reviews.md', 'w') as f:
              if ai_comments:
                  f.write('\\n\\n---\\n\\n'.join(ai_comments))
              else:
                  f.write('')
          print(f'Found {len(ai_comments)} previous AI review comments')
          " > /dev/null 2>&1 || echo "No previous comments"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Gemini Review (Round 1)
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr.diff)
          PREVIOUS=$(cat /tmp/previous_reviews.md 2>/dev/null)

          PROMPT="You are an expert code reviewer participating in a collaborative multi-AI review.

Your role: GEMINI (Google) — First reviewer, focus on code quality and security.

Requirements:
1. SUMMARY: 1-2 sentences summarizing the changes
2. ISSUES: List each issue with severity (CRITICAL/HIGH/MEDIUM/LOW)
3. SUGGESTIONS: Optional improvements
4. VERDICT: Start with APPROVE or REQUEST_CHANGES

$([ -n "$PREVIOUS" ] && echo "Previous AI reviews in this thread:\\n$PREVIOUS\\n\\nYour turn — you may agree, disagree, or add new findings:" || echo "You are the first reviewer. No previous reviews yet.")

Diff to review:
---DIFF---
${DIFF_CONTENT}
---END DIFF---"

          ESCAPED_PROMPT=$(echo "$PROMPT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')

          curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":${ESCAPED_PROMPT}}]}]}" \
            > /tmp/gemini-result.json 2>&1 || true

      - name: Format Gemini result
        run: |
          python3 -c "
          import json
          try:
              with open('/tmp/gemini-result.json') as f:
                  data = json.load(f)
              text = ''
              if 'candidates' in data and data['candidates']:
                  for p in data['candidates'][0].get('content',{}).get('parts',[]):
                      text += p.get('text','')
              with open('/tmp/gemini-review.md', 'w') as f:
                  f.write(text or 'Error: No response from Gemini')
          except Exception as e:
              with open('/tmp/gemini-review.md', 'w') as f:
                  f.write(f'Error: {e}')
          "

      - name: Post Gemini comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/gemini-review.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Gemini Code Review (Round 1)\n\n<details>\n<summary>Review Details</summary>\n\n\`\`\`\n${result}\n\`\`\`\n\n</details>\n\n*Generated by Gemini AI*`
            });

      - name: Agnes Review
        id: agnes
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr.diff)
          GEMINI_REVIEW=$(cat /tmp/gemini-review.md)

          PROMPT="You are an expert code reviewer participating in a collaborative multi-AI review.

Your role: AGNES (Agnes AI) — Second reviewer. Read Gemini's review below, then provide your own analysis.

Gemini's review:
---
${GEMINI_REVIEW}
---

Requirements:
1. SUMMARY: 1-2 sentences
2. ISSUES: List each issue with severity (CRITICAL/HIGH/MEDIUM/LOW)
3. AGREEMENT/DISAGREEMENT: Do you agree with Gemini's findings? Any different perspective?
4. VERDICT: APPROVE or REQUEST_CHANGES

Diff to review:
---DIFF---
${DIFF_CONTENT}
---END DIFF---"

          ESCAPED_PROMPT=$(echo "$PROMPT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')

          curl -s -X POST \
            "https://apihub.agnes-ai.com/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: ${AGNES_API_KEY}" \
            -d "{\"model\":\"agnes-2.0-flash\",\"messages\":[{\"role\":\"user\",\"content\":${ESCAPED_PROMPT}}]}" \
            > /tmp/agnes-result.json 2>&1 || true

      - name: Format Agnes result
        run: |
          python3 -c "
          import json
          try:
              with open('/tmp/agnes-result.json') as f:
                  data = json.load(f)
              text = ''
              if 'choices' in data and data['choices']:
                  text = data['choices'][0]['message']['content']
              with open('/tmp/agnes-review.md', 'w') as f:
                  f.write(text or 'Error: No response from Agnes AI')
          except Exception as e:
              with open('/tmp/agnes-review.md', 'w') as f:
                  f.write(f'Error: {e}')
          "

      - name: Post Agnes comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/agnes-review.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Agnes AI Review\n\n<details>\n<summary>Review Details</summary>\n\n\`\`\`\n${result}\n\`\`\`\n\n</details>\n\n*Generated by Agnes AI*`
            });

      - name: StepFun Review
        id: stepfun
        env:
          STEPFUN_API_KEY: ${{ secrets.STEPFUN_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr.diff)
          GEMINI_REVIEW=$(cat /tmp/gemini-review.md)
          AGNES_REVIEW=$(cat /tmp/agnes-review.md)

          PROMPT="You are an expert code reviewer participating in a collaborative multi-AI review.

Your role: CLAUDE (StepFun) — Third and final reviewer. Read both Gemini's and Agnes's reviews below, then provide your synthesis.

Gemini's review:
---
${GEMINI_REVIEW}
---

Agnes AI's review:
---
${AGNES_REVIEW}
---

Requirements:
1. SUMMARY: 1-2 sentences summarizing the changes
2. ISSUES: List each issue with severity (CRITICAL/HIGH/MEDIUM/LOW) — include any issues the previous reviewers missed
3. CONSENSUS: Do you agree with Gemini and Agnes? Where do you differ?
4. VERDICT: APPROVE or REQUEST_CHANGES (this is the final verdict)

Diff to review:
---DIFF---
${DIFF_CONTENT}
---END DIFF---"

          ESCAPED_PROMPT=$(echo "$PROMPT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')

          curl -s -X POST \
            "https://api.stepfun.com/step_plan/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $STEPFUN_API_KEY" \
            -d "{\"model\":\"step-3.7-flash\",\"messages\":[{\"role\":\"user\",\"content\":${ESCAPED_PROMPT}}]}" \
            > /tmp/stepfun-result.json 2>&1 || true

      - name: Format StepFun result
        run: |
          python3 -c "
          import json
          try:
              with open('/tmp/stepfun-result.json') as f:
                  data = json.load(f)
              text = ''
              if 'choices' in data and data['choices']:
                  text = data['choices'][0]['message']['content']
              with open('/tmp/stepfun-review.md', 'w') as f:
                  f.write(text or 'Error: No response from StepFun')
          except Exception as e:
              with open('/tmp/stepfun-review.md', 'w') as f:
                  f.write(f'Error: {e}')
          "

      - name: Post StepFun comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/stepfun-review.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Claude Review (StepFun)\n\n<details>\n<summary>Review Details</summary>\n\n\`\`\`\n${result}\n\`\`\`\n\n</details>\n\n*Generated by Claude via StepFun API*`
            });

      - name: Post summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const gemini = fs.readFileSync('/tmp/gemini-review.md', 'utf8');
            const agnes = fs.readFileSync('/tmp/agnes-review.md', 'utf8');
            const stepfun = fs.readFileSync('/tmp/stepfun-review.md', 'utf8');

            const body = `## AI Collaborative Review — Summary

All 3 AIs have reviewed this PR:

| Reviewer | Verdict |
|----------|---------|
| Gemini | See Round 1 comment above |
| Agnes AI | See comment above |
| Claude (StepFun) | See comment above |

*Next steps: If any reviewer requested changes, address them and push. The workflow will re-run automatically on the next push.*`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
