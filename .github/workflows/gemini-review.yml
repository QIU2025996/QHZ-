name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- . ':(exclude)package-lock.json' ':(exclude)pnpm-lock.yaml' ':(exclude)yarn.lock' > /tmp/pr.diff
          echo "diff_size=$(wc -c < /tmp/pr.diff)" >> $GITHUB_OUTPUT

      - name: Skip if no code changes
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No code changes to review" && exit 0

      - name: Run Gemini Review
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr.diff)

          PROMPT="You are an expert code reviewer. Review the following pull request diff and provide a structured review.

          Requirements:
          1. SUMMARY: 1-2 sentences summarizing the changes
          2. ISSUES: List each issue with severity (CRITICAL/HIGH/MEDIUM/LOW)
          3. SUGGESTIONS: Optional improvements
          4. VERDICT: APPROVE or REQUEST_CHANGES

          Diff to review:
          ---DIFF---
          ${DIFF_CONTENT}
          ---END DIFF---"

          ESCAPED_PROMPT=$(echo "$PROMPT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')

          curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":${ESCAPED_PROMPT}}]}]}" \
            > /tmp/review-result.json 2>&1 || true

      - name: Format review result
        id: format
        run: |
          python3 -c "
          import json, sys

          try:
              with open('/tmp/review-result.json', 'r') as f:
                  data = json.load(f)

              text = ''
              if 'candidates' in data and len(data['candidates']) > 0:
                  candidate = data['candidates'][0]
                  if 'content' in candidate and 'parts' in candidate['content']:
                      for part in candidate['content']['parts']:
                          if 'text' in part:
                              text += part['text']

              if text:
                  with open('/tmp/review-result.md', 'w') as f:
                      f.write(text)
              else:
                  with open('/tmp/review-result.md', 'w') as f:
                      f.write('Error: No review content received from Gemini API\\n\\nResponse: ' + json.dumps(data, indent=2))
          except Exception as e:
              with open('/tmp/review-result.md', 'w') as f:
                  f.write(f'Error parsing Gemini response: {str(e)}\\n\\nRaw output:\\n')
                  with open('/tmp/review-result.json', 'r') as rf:
                      f.write(rf.read())
          "

      - name: Post review to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/review-result.md', 'utf8');

            const body = `## Gemini Code Review\n\n<details>\n<summary>Review Details</summary>\n\n\`\`\`\n${result}\n\`\`\`\n\n</details>\n\n*This review was automatically generated by Gemini. Verify findings before acting.*`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
