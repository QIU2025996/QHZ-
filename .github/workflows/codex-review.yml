name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="origin/main"
          fi
          git diff $BASE...HEAD -- . ':(exclude)package-lock.json' ':(exclude)pnpm-lock.yaml' ':(exclude)yarn.lock' > /tmp/pr.diff
          echo "diff_size=$(wc -c < /tmp/pr.diff)" >> $GITHUB_OUTPUT

      - name: Skip if no code changes
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No code changes to review" && exit 0

      - name: StepFun Review
        id: review
        env:
          STEPFUN_API_KEY: ${{ secrets.STEPFUN_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr.diff)

          PROMPT="You are an expert code reviewer.

Review the following pull request diff.

Requirements:
1. SUMMARY: 1-2 sentences
2. ISSUES: List with severity (CRITICAL/HIGH/MEDIUM/LOW)
3. SUGGESTIONS: Optional improvements
4. VERDICT: APPROVE or REQUEST_CHANGES

Diff:
---DIFF---
${DIFF_CONTENT}
---END DIFF---"

          python3 -c "
import json, urllib.request, os

prompt = '''${PROMPT}'''

data = json.dumps({
    'model': 'step-3.7-flash',
    'messages': [{'role': 'user', 'content': prompt}]
}).encode()

req = urllib.request.Request(
    'https://api.stepfun.com/step_plan/v1/chat/completions',
    data=data,
    headers={
        'Content-Type': 'application/json',
        'Authorization': f'Bearer {os.environ[\"STEPFUN_API_KEY\"]}'
    }
)
with urllib.request.urlopen(req) as resp:
    result = json.loads(resp.read())
    text = result['choices'][0]['message']['content']
    with open('/tmp/review-result.md', 'w') as f:
        f.write(text)
" 2>&1 || echo "Error: StepFun API call failed" > /tmp/review-result.md

      - name: Post review to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/review-result.md', 'utf8');

            const body = `## Codex Review (StepFun)\n\n<details>\n<summary>Review Details</summary>\n\n\`\`\`\n${result}\n\`\`\`\n\n</details>\n\n*This review was automatically generated by StepFun API. Verify findings before acting.*`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
