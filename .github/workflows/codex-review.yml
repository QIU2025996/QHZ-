name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- . ':(exclude)package-lock.json' ':(exclude)pnpm-lock.yaml' ':(exclude)yarn.lock' > /tmp/pr.diff
          echo "diff_size=$(wc -c < /tmp/pr.diff)" >> $GITHUB_OUTPUT

      - name: Skip if no code changes
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No code changes to review" && exit 0

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex Review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex exec --sandbox read-only -m gpt-5.4 -C "$(pwd)" \
            "Review this pull request diff. \
             Provide a structured review with: \
             1. SUMMARY (1-2 sentences) \
             2. ISSUES (list each with severity: CRITICAL/HIGH/MEDIUM/LOW) \
             3. SUGGESTIONS (optional improvements) \
             4. VERDICT: APPROVE or REQUEST_CHANGES \
             ---DIFF---" \
            < /tmp/pr.diff > /tmp/review-result.md 2>&1 || true

      - name: Post review to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/review-result.md', 'utf8');

            const body = `## Codex Review\n\n<details>\n<summary>Review Details</summary>\n\n\`\`\`\n${result}\n\`\`\`\n\n</details>\n\n*This review was automatically generated by Codex CLI. Verify findings before acting.*`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
